name: portrait
description: "Quality evaluation rubric optimized for AI-generated portraits and headshots."
pass_threshold: 0.70
checks:
  - check: face_artifacts
    weight: 0.30
    threshold: 0.7
  - check: prompt_adherence
    weight: 0.20
  - check: aesthetic_quality
    weight: 0.20
  - check: hand_artifacts
    weight: 0.15
  - check: resolution_adequacy
    weight: 0.15
    params:
      min_width: 1024
      min_height: 1024
