name: general_quality
description: "Balanced quality evaluation rubric for general AI-generated images."
pass_threshold: 0.65
checks:
  - check: prompt_adherence
    weight: 0.25
  - check: aesthetic_quality
    weight: 0.20
  - check: face_artifacts
    weight: 0.15
  - check: hand_artifacts
    weight: 0.15
  - check: text_legibility
    weight: 0.10
  - check: resolution_adequacy
    weight: 0.10
  - check: clip_similarity
    weight: 0.05
